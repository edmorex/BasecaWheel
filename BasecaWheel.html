<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BascaWheel</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />
<style>
  :root {
    --bg: #020617;
    --panel: #0f172a;
    --panel2: #1e293b;
    --text: #f8fafc;
    --accent: #22c55e;
    --danger: #ef4444;
    --gold: #fbbf24;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    overflow: hidden;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
    color: var(--text);
    background: radial-gradient(circle at top, #1e293b, #020617);
  }

  .app {
    width: 100%;
    max-width: 1800px;
    height: calc(100vh - 40px);
    margin: auto;
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: minmax(0, 1fr);
    column-gap: 24px;
    transition: column-gap 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .app.sidebar-collapsed { column-gap: 0; }

  .sidebar-wrapper {
    width: 520px;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .sidebar-wrapper > .panel {
    flex: 1;
    min-height: 0;
  }

  .panel {
    background: rgba(15,23,42,0.94);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    overflow: hidden;
  }

  .sidebar { display: flex; flex-direction: column; min-height: 0; position: relative; }
  h1 { margin-top: 0; margin-bottom: 4px; font-size: 28px; text-align: center; }
  h2 { margin-top: 0; margin-bottom: 6px; font-size: 14px; opacity: 0.75; text-transform: uppercase; letter-spacing: 1px; }
  h3 { margin-top: 0; margin-bottom: 6px; font-size: 14px; opacity: 0.75; text-transform: uppercase; letter-spacing: 1px; }
  .subtitle {
    opacity: 0.72;
    font-size: 12px;
    line-height: 1.4;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    text-align: center;
  }

  /* ── Wheel list ── */
  .wheel-list-section {
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .wheel-add-row {
    display: grid;
    grid-template-columns: 1fr 70px;
    gap: 8px;
    margin-bottom: 6px;
  }

  .wheel-scroll-wrap {
    position: relative;
    overflow: hidden;
    border-radius: 12px;
    margin-bottom: 6px;
  }

  .wheel-list-scroll {
    /* Fixed height — shows ~2.5 wheel rows so Entrants section stays at a
       stable Y even as wheels are added/removed. Each row ≈ 42px + 6px gap. */
    height: 110px;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 4px;
    scroll-behavior: smooth;
  }

  .wheel-row {
    display: grid;
    grid-template-columns: 18px 1fr 30px;
    gap: 6px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 4px 8px;
    border: 1px solid transparent;
  }

  .wheel-row.active-wheel {
    background: rgba(251,191,36,0.1);
    border-color: rgba(251,191,36,0.3);
  }

  .wheel-row input[type="radio"] {
    width: 16px !important;
    height: 16px !important;
    padding: 0 !important;
    background: transparent !important;
    border-radius: 0 !important;
    cursor: pointer;
    accent-color: var(--gold);
    margin: 0;
    flex-shrink: 0;
  }

  .wheel-title-edit {
    background: transparent !important;
    border: none !important;
    border-bottom: 1px solid rgba(255,255,255,0.2) !important;
    border-radius: 0 !important;
    padding: 4px 6px !important;
    color: white;
    font-size: 14px;
    width: 100%;
    transition: border-color 0.15s;
  }
  .wheel-title-edit:focus {
    outline: none;
    border-bottom-color: var(--gold) !important;
  }

  .clone-btn {
    width: 30px; height: 30px;
    padding: 0;
    border-radius: 8px;
    background: #475569;
    color: white;
    font-size: 14px;
  }

  /* ── Rest of sidebar ── */
  .input-row {
    display: grid;
    grid-template-columns: 1fr 70px;
    gap: 8px;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    background: var(--panel2);
    color: white;
    font-size: 14px;
  }

  button {
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.15s ease;
    font-size: 14px;
  }

  button:hover { transform: translateY(-1px); }
  .primary { background: var(--accent); color: black; }
  .danger  { background: var(--danger);  color: white; }

  .entrant-section {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    position: relative;
  }

  .entrant-scroll-wrap {
    position: relative;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    border-radius: 18px;
  }

  .entrant-list {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 6px;
    scroll-behavior: smooth;
  }

  .scroll-fade {
    position: absolute;
    left: 0; right: 0;
    height: 36px;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .scroll-fade.show { opacity: 1; }
  .scroll-fade.top    { top: 0;    background: linear-gradient(to bottom, rgba(15,23,42,1), rgba(15,23,42,0)); }
  .scroll-fade.bottom { bottom: 0; background: linear-gradient(to top,   rgba(15,23,42,1), rgba(15,23,42,0)); }

  .scroll-indicator {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    color: rgba(255,255,255,0.75);
  }
  .scroll-fade.top    .scroll-indicator { top: 4px; }
  .scroll-fade.bottom .scroll-indicator { bottom: 4px; }

  .entrant {
    display: grid;
    grid-template-columns: minmax(0,1fr) 130px 32px;
    gap: 8px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 6px 8px;
    min-height: 44px;
  }

  .weight-control { display: flex; align-items: center; gap: 4px; }

  .weight-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    padding: 0;
    background: #475569;
    color: white;
    font-size: 16px;
  }

  .weight-input {
    width: 60px;
    text-align: center;
    font-weight: bold;
    font-size: 15px;
    padding: 4px;
    -moz-appearance: textfield;
    appearance: textfield;
  }
  .weight-input::-webkit-outer-spin-button,
  .weight-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .remove-btn {
    width: 32px; height: 32px;
    padding: 0;
    border-radius: 9px;
    background: var(--danger);
    color: white;
  }

  .stats { flex: 1; opacity: 0.8; line-height: 1.6; font-size: 14px; }

  /* ── Sidebar footer ── */
  .sidebar-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 8px;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 8px;
  }

  /* ── Entrant controls row ── */
  .entrant-controls {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    align-items: stretch;
  }
  .bulk-btn {
    flex: 1;
    background: #475569;
    color: white;
    border-radius: 10px;
    padding: 8px 10px;
  }
  .clear-right-btn {
    width: 33%;
    flex-shrink: 0;
  }

  /* ── Wheel button row ── */
  .wheel-clear-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: stretch;
  }

  /* ── Panel toggle button ── */
  .panel-toggle {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    z-index: 100;
    background: none;
    color: rgba(255,255,255,0.2);
    border: none;
    font-size: 18px;
    font-weight: 300;
    padding: 0;
    line-height: 1;
    transition: color 0.15s;
  }
  .panel-toggle:hover {
    background: none;
    color: rgba(255,255,255,0.55);
    transform: none;
  }

  /* ── Wheel panel ── */
  .wheel-wrap {
    position: relative;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Pink fire that rises from the bottom of the wheel panel.
     The animation duration is driven by --flame-speed, set from JS to mirror
     the wheel's angular velocity (faster spin → faster flicker). */
  .wheel-wrap::before,
  .wheel-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    transform-origin: 50% 100%;
    /* Safari bug: overflow:hidden + border-radius on .wheel-wrap fails to
       clip pseudo-elements that have CSS filter or mix-blend-mode. Giving
       these layers the parent's border-radius makes them self-clip, so the
       flame can't poke out through the rounded bottom corners on Safari. */
    border-radius: inherit;
  }
  .wheel-wrap::before {
    background:
      radial-gradient(ellipse 35% 72% at 22% 105%, rgba(255, 45,120,0.90) 0%, transparent 72%),
      radial-gradient(ellipse 42% 84% at 50% 108%, rgba(255, 30, 90,0.95) 0%, transparent 74%),
      radial-gradient(ellipse 35% 72% at 78% 105%, rgba(255, 45,120,0.90) 0%, transparent 72%),
      linear-gradient(to top, rgba(255,45,120,0.45) 0%, rgba(255,105,180,0.18) 32%, transparent 60%);
    filter: blur(7px);
    animation: flameFlicker var(--flame-speed, 1.6s) ease-in-out infinite;
  }
  .wheel-wrap::after {
    background:
      radial-gradient(ellipse 22% 62% at 35% 105%, rgba(255,210,225,0.85) 0%, transparent 70%),
      radial-gradient(ellipse 26% 67% at 50% 108%, rgba(255,170,200,0.90) 0%, transparent 73%),
      radial-gradient(ellipse 22% 62% at 65% 105%, rgba(255,210,225,0.85) 0%, transparent 70%);
    filter: blur(9px);
    mix-blend-mode: screen;
    animation: flameFlicker2 var(--flame-speed, 1.6s) ease-in-out infinite alternate;
  }

  /* Freeze flames while a winner is on screen; resumes when the user
     dismisses the winner and the wheel returns to idle. */
  .wheel-wrap.flames-paused::before,
  .wheel-wrap.flames-paused::after {
    animation-play-state: paused;
  }

  /* Only scaleY: keeps the side edges fixed (no horizontal pulsation gaps)
     while letting the top edge lick up and down like fire. transform-origin
     is 50% 100% on the parent, so all the motion happens off the top. */
  @keyframes flameFlicker {
    0%, 100% { transform: scaleY(1.00); }
    15%      { transform: scaleY(1.18); }
    30%      { transform: scaleY(0.90); }
    45%      { transform: scaleY(1.28); }
    60%      { transform: scaleY(0.93); }
    78%      { transform: scaleY(1.12); }
  }
  @keyframes flameFlicker2 {
    0%   { transform: scaleY(0.95); }
    18%  { transform: scaleY(1.22); }
    36%  { transform: scaleY(0.85); }
    55%  { transform: scaleY(1.30); }
    72%  { transform: scaleY(0.95); }
    100% { transform: scaleY(1.15); }
  }

  canvas {
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
    filter: drop-shadow(0 0 24px rgba(0,0,0,0.5));
    position: relative;
    z-index: 5;
  }

  /* ── Wheel title overlay ── */
  .wheel-title {
    position: absolute;
    top: 18px;
    left: 0; right: 0;
    text-align: center;
    z-index: 25;
    pointer-events: none;
    padding: 0 24px;
  }

  .wheel-title-text {
    display: inline-block;
    /* font-size is dynamically set by fitWheelTitle() in JS — kept here as
       the initial paint value before the first JS measurement runs. */
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #ff2d78;
    text-shadow:
      0 0 10px rgba(255,45,120,1),
      0 0 30px rgba(255,45,120,0.85),
      0 0 60px rgba(255,45,120,0.6),
      0 0 100px rgba(255,45,120,0.35),
      0 2px 8px rgba(0,0,0,0.9);
    line-height: 1.1;
    white-space: nowrap;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .wheel-title-text.visible {
    opacity: 1;
    transform: translateY(0);
    animation: pinkGlowPulse 1.8s ease-in-out infinite;
  }

  @keyframes pinkGlowPulse {
    0%, 100% {
      text-shadow:
        0 0 10px rgba(255,45,120,1),
        0 0 30px rgba(255,45,120,0.85),
        0 0 60px rgba(255,45,120,0.55),
        0 0 100px rgba(255,45,120,0.3),
        0 2px 8px rgba(0,0,0,0.9);
    }
    50% {
      text-shadow:
        0 0 18px rgba(255,45,120,1),
        0 0 55px rgba(255,45,120,1),
        0 0 110px rgba(255,45,120,0.8),
        0 0 180px rgba(255,45,120,0.5),
        0 2px 8px rgba(0,0,0,0.9);
    }
  }

  /* Pointer: left-pointing triangle, hinge on right edge */
  .pointer {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    transform-origin: right center;
    width: 0; height: 0;
    border-top:    16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right:  64px solid #ff2d78;
    z-index: 20;
    filter:
      drop-shadow(0 0 10px rgba(0,0,0,0.5))
      drop-shadow(0 0 8px rgba(255,45,120,0.7));
  }

  .pointer.tick-cw  { animation: pointerTickCW  0.11s ease; }
  .pointer.tick-ccw { animation: pointerTickCCW 0.11s ease; }

  @keyframes pointerTickCW {
    0%   { transform: translateY(-50%) rotate(0deg); }
    40%  { transform: translateY(-50%) rotate(-20deg); }
    100% { transform: translateY(-50%) rotate(0deg); }
  }
  @keyframes pointerTickCCW {
    0%   { transform: translateY(-50%) rotate(0deg); }
    40%  { transform: translateY(-50%) rotate(20deg); }
    100% { transform: translateY(-50%) rotate(0deg); }
  }

  .wheel-emoji {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 15;
    user-select: none;
    pointer-events: none;
    filter: drop-shadow(0 0 12px rgba(0,0,0,0.5));
    animation: emojiIdle 3.5s ease-in-out infinite;
    line-height: 1;
  }
  .wheel-emoji img {
    display: block;
    width: 1.4em;
    height: 1.4em;
    -webkit-user-drag: none;
  }

  @keyframes emojiIdle {
    0%   { transform: translate(-50%,-50%) rotate(-5deg); }
    50%  { transform: translate(-50%,-50%) rotate(5deg); }
    100% { transform: translate(-50%,-50%) rotate(-5deg); }
  }

  .wheel-emoji.excited  { animation: emojiExcited  0.22s linear      infinite; }
  .wheel-emoji.nervous  { animation: emojiNervous  0.07s linear      infinite; }
  .wheel-emoji.mischief { animation: emojiMischief 0.18s ease-in-out infinite; }
  .wheel-emoji.shocked  { animation: emojiShocked  0.3s  ease-out    1; }

  @keyframes emojiExcited {
    0%   { transform: translate(-50%,-50%) rotate(-10deg) scale(1); }
    50%  { transform: translate(-50%,-50%) rotate(10deg)  scale(1.08); }
    100% { transform: translate(-50%,-50%) rotate(-10deg) scale(1); }
  }
  @keyframes emojiNervous {
    0%   { transform: translate(-50%,-50%) translateX(-4px); }
    50%  { transform: translate(-50%,-50%) translateX(4px); }
    100% { transform: translate(-50%,-50%) translateX(-4px); }
  }
  @keyframes emojiMischief {
    0%   { transform: translate(-50%,-50%) rotate(-14deg) scale(1); }
    50%  { transform: translate(-50%,-50%) rotate(14deg)  scale(1.15); }
    100% { transform: translate(-50%,-50%) rotate(-14deg) scale(1); }
  }
  @keyframes emojiShocked {
    0%   { transform: translate(-50%,-50%) scale(1.3); }
    100% { transform: translate(-50%,-50%) scale(1); }
  }

  .winner-overlay {
    /* The overlay is moved to <body> at script startup (see syncOverlayToWheelPanel
       in JS) so it isn't trapped inside the wheel-wrap's stacking context
       — which is created because .panel has backdrop-filter, which both
       creates a stacking context and acts as the containing block for
       fixed descendants. Body-level absolute positioning + JS-set
       left/top/width/height to match wheelWrap.getBoundingClientRect()
       keeps the popup visually over the wheel panel while letting its
       z-index (100) sit in body's root stacking context, above the
       body-level confetti (z-index 25) and below modals (200). */
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: 8%;
    pointer-events: none;
    opacity: 0;
    transition: 0.4s ease;
    z-index: 100;
  }
  .winner-overlay.show { opacity: 1; }

  /* The glow lives on the wrapper, NOT on winner-box itself.
     Reason: filter applied to an element is composited BEFORE clip-path in
     browsers, so drop-shadow on the clipped element gets clipped away.
     Moving filter to the parent means the parent sees the already-clipped
     heart shape and casts the shadow outward correctly. */
  .winner-heart-wrap {
    position: relative;
    animation: winnerPop 0.7s ease;
  }
  .winner-heart-wrap:not(:has(.winner-box.exploded)) {
    animation: winnerPop 0.7s ease, heartGlow 5s linear infinite;
  }

  @keyframes heartGlow {
    0%   { filter: drop-shadow(0 0 14px hsla(  0,100%,65%,1)) drop-shadow(0 0 40px hsla(  0,100%,65%,0.6)) drop-shadow(0 0 80px hsla(  0,100%,65%,0.3)); }
    17%  { filter: drop-shadow(0 0 14px hsla( 60,100%,65%,1)) drop-shadow(0 0 40px hsla( 60,100%,65%,0.6)) drop-shadow(0 0 80px hsla( 60,100%,65%,0.3)); }
    33%  { filter: drop-shadow(0 0 14px hsla(120,100%,65%,1)) drop-shadow(0 0 40px hsla(120,100%,65%,0.6)) drop-shadow(0 0 80px hsla(120,100%,65%,0.3)); }
    50%  { filter: drop-shadow(0 0 14px hsla(180,100%,65%,1)) drop-shadow(0 0 40px hsla(180,100%,65%,0.6)) drop-shadow(0 0 80px hsla(180,100%,65%,0.3)); }
    67%  { filter: drop-shadow(0 0 14px hsla(240,100%,65%,1)) drop-shadow(0 0 40px hsla(240,100%,65%,0.6)) drop-shadow(0 0 80px hsla(240,100%,65%,0.3)); }
    83%  { filter: drop-shadow(0 0 14px hsla(300,100%,65%,1)) drop-shadow(0 0 40px hsla(300,100%,65%,0.6)) drop-shadow(0 0 80px hsla(300,100%,65%,0.3)); }
    100% { filter: drop-shadow(0 0 14px hsla(360,100%,65%,1)) drop-shadow(0 0 40px hsla(360,100%,65%,0.6)) drop-shadow(0 0 80px hsla(360,100%,65%,0.3)); }
  }

  .winner-box {
    text-align: center;
    width: 560px;
    height: 420px;
    box-sizing: border-box;
    padding: 61px 70px 89px 70px;
    background: rgba(210, 25, 100, 0.75);
    /* backdrop-filter omitted: when the parent has filter it creates an
       isolated rendering group, making backdrop-filter blur transparent
       pixels rather than the wheel behind — so it has no useful effect. */
    clip-path: url(#heart-clip);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  /* Exploded / nobody-wins state: revert to a plain dark rectangle. */
  .winner-box.exploded {
    clip-path: none;
    border-radius: 20px;
    border: 2px solid rgba(239,68,68,0.4);
    width: auto;
    height: auto;
    padding: 28px 44px;
    background: rgba(0,0,0,0.78);
    box-shadow: 0 0 40px rgba(239,68,68,0.6), 0 0 90px rgba(239,68,68,0.35);
  }

  /* Hide the "🎉 WINNER 🎉" label inside the heart — the winner name
     alone fills the space. Keep it visible for the exploded state. */
  .winner-box:not(.exploded) .winner-title {
    display: none;
  }
  .winner-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .winner-title.bad { color: var(--danger); }

  .winner-name {
    font-size: 52px;
    line-height: 1.1;
    font-weight: 900;
    text-transform: uppercase;
    max-width: 360px;
    word-break: break-word;
    color: #ffffff;
  }

  @keyframes winnerPop {
    0%   { transform: scale(0.5) rotate(-8deg); opacity: 0; }
    70%  { transform: scale(1.08) rotate(2deg); }
    100% { transform: scale(1)    rotate(0deg); opacity: 1; }
  }

  .mute-btn {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(15,23,42,0.72);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 18px;
    padding: 0;
    z-index: 26;
    backdrop-filter: blur(6px);
    transition: background 0.15s, color 0.15s;
  }
  .mute-btn:hover {
    background: rgba(15,23,42,0.9);
    color: rgba(255,255,255,0.85);
    transform: none;
  }

  /* History button: same chrome as mute, mirrored to bottom-left.
     The "off" (list hidden) look uses BOTH a grayscale filter AND a low
     opacity. Safari's color-emoji renderer sometimes ignores CSS filters,
     so the opacity is what guarantees a visibly dimmed/inactive look in
     every browser; the grayscale just adds extra desaturation where it
     does apply (Chrome). Hover only adjusts the chrome — it never touches
     opacity or filter, so the "off" look is purely tied to .active. */
  .history-btn {
    position: absolute;
    bottom: 16px;
    left: 16px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(15,23,42,0.72);
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 18px;
    padding: 0;
    z-index: 26;
    backdrop-filter: blur(6px);
    opacity: 0.45;
    -webkit-filter: grayscale(1);
    filter: grayscale(1);
    transition: background 0.15s, color 0.15s, opacity 0.2s,
                -webkit-filter 0.2s, filter 0.2s;
  }
  .history-btn:hover {
    background: rgba(15,23,42,0.9);
    color: rgba(255,255,255,0.85);
    transform: none;
  }
  .history-btn.active {
    opacity: 1;
    -webkit-filter: none;
    filter: none;
  }

  /* Winner-history list — plain text floating above the history button.
     Anchored at bottom; flex-direction: column-reverse + DOM-prepend gives
     newest-at-bottom and clips OLDEST entries off the top when overflowing. */
  .history-list {
    position: absolute;
    left: 16px;
    right: 70px; /* leave space so long names don't crash into the wheel */
    bottom: 64px;
    z-index: 26;
    pointer-events: none;
    display: flex;
    flex-direction: column-reverse;
    gap: 4px;
    color: white;
    font-size: 16px;
    font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6), 0 0 8px rgba(0,0,0,0.4);
    max-height: calc(100% - 110px);
    overflow: hidden;
  }
  .history-list.hidden { display: none; }
  .history-list .history-item {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .settings-btn {
    flex-shrink: 0;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(15,23,42,0.95);
    color: white;
    font-size: 24px;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    padding: 0;
  }
  .settings-btn:hover { transform: rotate(18deg); }

  /* ── Mischief Settings modal overlay ── */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);

    align-items: center;
    justify-content: center;
  }
  .settings-overlay.hidden { display: none; }

  .settings-panel {

    height: 85vh;
    background: rgba(15,23,42,0.98);
    border: 1px solid rgba(255,255,255,0.1);

  .settings-panel-header {

  .settings-body-wrap {

    overflow: hidden;
  }
  .settings-panel-body {
    height: 100%;
    overflow-y: auto;

  .settings-section { display: flex; flex-direction: column; gap: 12px; }

  /* ── Image settings ── */

  @media (max-width: 640px) {
    .settings-panel-body { grid-template-columns: 1fr; height: auto; }
  }

  /* Confetti burst particles fired from the edges of the winner box.
     --tx/--ty/--tr drive the final translate+rotate; gravity is baked into
     --ty by the JS so all particles eventually fall. z-index sits below the
     winner-overlay (z-index: 30) so particles spawn *behind* the popup and
     visually emerge as they animate out past its edges. */
  .burst-confetti {
    position: fixed;
    pointer-events: none;
    border-radius: 2px;
    z-index: 25;
    animation: confettiBurst linear forwards;
  }
  @keyframes confettiBurst {
    to { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
  }

  .shard {
    position: fixed;
    pointer-events: none;
    border-radius: 3px;
    animation: shardFly linear forwards;
  }
  /* Image debris launched alongside the confetti shards in launchExplosion.
     Reuses shardFly so its --tx/--ty/--tr CSS vars drive the same fly-out
     transform, fading out over the chosen animation-duration. */
  .explode-img {
    position: fixed;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    z-index: 1000;
    animation: shardFly linear forwards;
    filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
  }
  @keyframes shardFly {
    to { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)); opacity: 0; }
  }

  @keyframes shake {
    0%,100% { transform: translate(0,0)      rotate(0deg);    }
    10%      { transform: translate(-8px, 4px) rotate(-1.5deg); }
    20%      { transform: translate( 9px,-5px) rotate( 1.2deg); }
    30%      { transform: translate(-6px, 7px) rotate(-0.8deg); }
    40%      { transform: translate( 8px,-3px) rotate( 1.5deg); }
    50%      { transform: translate(-9px, 5px) rotate(-1deg);   }
    60%      { transform: translate( 6px, 6px) rotate( 0.9deg); }
    70%      { transform: translate(-7px,-4px) rotate(-1.3deg); }
    80%      { transform: translate( 5px, 3px) rotate( 0.7deg); }
    90%      { transform: translate(-4px,-6px) rotate(-0.5deg); }
  }
  .shaking { animation: shake 0.55s ease forwards; }

  /* ── Confirmation modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);

  .modal-box {

  .modal-actions { display: flex; gap: 12px; justify-content: center; }
  .modal-actions button { min-width: 110px; }
  .modal-actions button:not(.danger) { background: #475569; color: white; }

  /* ── Raw data modal ── */
  .raw-data-box {
    background: #0f172a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px;

  .raw-data-hint  { font-size: 12px; opacity: 0.6; margin: 0; line-height: 1.4; }
  .raw-data-error { font-size: 13px; color: var(--danger); min-height: 18px; }
  #rawDataText {
    flex: 1;
    min-height: 320px;

  .raw-data-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
  .raw-data-actions button { background: #475569; color: white; min-width: 130px; padding: 10px 14px; }
  .raw-data-actions button.primary { background: var(--accent); color: black; }

  /* ── Mobile single-column layout ── */
  @media (max-width: 640px) {
    body {
      overflow: auto;
      padding: 12px;
    }

    .app {
      height: auto;
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      row-gap: 16px;
      column-gap: 0;
    }

    .panel-toggle { display: none; }

    /* Wheel on top */
    .wheel-wrap {
      order: -1;
      height: 45vh;
      min-height: 260px;
    }

    /* Sidebar fills full width and sizes to content */
    .sidebar-wrapper {
      width: 100% !important;
      height: auto;
      min-height: auto;
    }

    .sidebar-wrapper > .panel {
      flex: none;
      min-height: auto;
      height: auto;
    }

    /* Unwind flex-scroll chain so sidebar grows naturally */
    .entrant-section {
      flex: none;
      min-height: auto;
      height: auto;
    }

    .entrant-scroll-wrap {
      flex: none;
      min-height: auto;
      overflow: visible;
      height: auto;
    }

    .entrant-list {
      height: auto;
      overflow: visible;
    }

    /* Wheels list — drop the fixed-height scroll cap on mobile so the list
       grows naturally with its content, matching the entrant-list behavior
       above. The scroll fades self-hide because scrollHeight === clientHeight. */
    .wheel-scroll-wrap {
      overflow: visible;
    }
    .wheel-list-scroll {
      height: auto;
      overflow: visible;
    }
  }
</style>
</head>

<script>
// ── Elements ──────────────────────────────────────────────────
const canvas        = document.getElementById("wheel");
const ctx           = canvas.getContext("2d");
const entrantListEl = document.getElementById("entrantList");
const statsDiv      = document.getElementById("stats");
const pointer       = document.getElementById("pointer");
const winnerOverlay = document.getElementById("winnerOverlay");
const winnerBox     = document.getElementById("winnerBox");
const winnerTitle   = document.getElementById("winnerTitle");
const winnerName    = document.getElementById("winnerName");
const wheelWrap     = document.querySelector(".wheel-wrap");
const wheelEmoji    = document.getElementById("wheelEmoji");
const wheelTitleText= document.getElementById("wheelTitleText");
const wheelListEl      = document.getElementById("wheelListEl");
const wheelTopFade     = document.getElementById("wheelTopFade");
const wheelBottomFade  = document.getElementById("wheelBottomFade");

// Reparent the winner overlay to <body>. The wheel panel has backdrop-filter
// (via .panel), which makes it both a stacking context AND the containing
// block for fixed descendants. That traps the overlay's z-index inside the
// panel, which causes the body-level confetti (z-index 25) to render on top
// of the popup. Lifting the overlay to body lets its z-index 100 sit in the
// root stacking context, above the confetti and below modals (z-index 200).
// JS keeps it visually pinned over the wheel panel — see syncOverlayToWheelPanel.
document.body.appendChild(winnerOverlay);

function syncOverlayToWheelPanel(isExploded = false) {
  const rect = wheelWrap.getBoundingClientRect();
  winnerOverlay.style.left   = (rect.left + window.scrollX) + "px";
  winnerOverlay.style.top    = (rect.top  + window.scrollY) + "px";
  winnerOverlay.style.width  = rect.width  + "px";
  winnerOverlay.style.height = rect.height + "px";

  if (isExploded) {
    winnerOverlay.style.paddingTop = "8%";
  } else {
    // Align the visible top of the heart just below the wheel title.
    // The clip-path's topmost pixel sits at 0.11 * 420px ≈ 46px inside the box.
    const titleEl = wheelWrap.querySelector(".wheel-title");
    const titleBottom = titleEl
      ? titleEl.getBoundingClientRect().bottom - rect.top
      : 70;
    const HEART_INTERNAL_TOP = 46; // 0.11 * 420px (matches clip-path + box height)
    const padTop = Math.max(0, titleBottom + 8 - HEART_INTERNAL_TOP);
    winnerOverlay.style.paddingTop = padTop + "px";
  }
}

];

];

const EMOJI = {
  idle:"😻", excited:"🤩", nervous:"😬", shocked:"😮", relieved:"😅",
  speed:"😜", slowdown:"🫣", swap:"🌀", reverse:"🔄", explode:"💥", winner:"🥳", nobody:"🙀",
};

// ── Spin state ────────────────────────────────────────────────
let currentRotation  = 0;
let spinning         = false;
let previousSliceIdx = -1;
let prevTickRotation = null;
let wasNearEdge      = false;
let wheelRadius      = 0;
let wheelCX          = 0;
let wheelCY          = 0;
let nobodyWinsActive = false;
let winnerShowing    = false;
let idleRafId        = null;
let idleLastTime     = 0;
const IDLE_RPS       = 1 / 45; // one full rotation every 45 seconds

function startIdleRotation() {
  if (idleRafId !== null) return;
  idleLastTime = performance.now();
  function tick(now) {
    if (spinning || winnerShowing) { idleRafId = null; return; }
    const dt = now - idleLastTime;
    idleLastTime = now;
    currentRotation = (currentRotation + IDLE_RPS * Math.PI * 2 * (dt / 1000)) % (Math.PI * 2);
    drawWheel(currentRotation);
    updateFlameSpeed(currentRotation, now);
    idleRafId = requestAnimationFrame(tick);
  }
  idleRafId = requestAnimationFrame(tick);
}

function stopIdleRotation() {
  if (idleRafId !== null) { cancelAnimationFrame(idleRafId); idleRafId = null; }
}

// ── Flame background speed ────────────────────────────────────
// Mirrors the wheel's angular velocity onto --flame-speed so the pink
// flames at the bottom of the wheel panel flicker faster while spinning.
let flameLastRot       = null;
let flameLastTime      = null;
let flameOmegaSmoothed = 0;
let flameCssLastUpdate = 0;

function updateFlameSpeed(rotation, now) {
  if (flameLastTime !== null) {
    const dt = (now - flameLastTime) / 1000;
    if (dt > 0 && dt < 0.5) {
      const inst = Math.abs(rotation - flameLastRot) / dt; // rad/s
      flameOmegaSmoothed = flameOmegaSmoothed * 0.85 + inst * 0.15;
    }
  }
  flameLastTime = now;
  flameLastRot  = rotation;

  // Throttle CSS updates to ~10 Hz; changing animation-duration mid-flight
  // re-syncs the keyframe phase, so doing it every frame causes visible jitter.
  // Floor (0.4s) keeps peak spin from looking like a strobe; base (2.5s) and
  // shallower omega coefficient (0.25) make idle pulsation slow and subtle.
  if (now - flameCssLastUpdate > 100) {
    const dur = Math.max(0.4, Math.min(3.0, 2.5 / (1 + flameOmegaSmoothed * 0.25)));
    wheelWrap.style.setProperty("--flame-speed", dur.toFixed(3) + "s");
    flameCssLastUpdate = now;
  }
}

// ── ID generation ─────────────────────────────────────────────
function newSlotId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ── Wheel list persistence ────────────────────────────────────
function saveWheelList() {
  localStorage.setItem(WHEEL_LIST_KEY, JSON.stringify(wheelList));
}

// ── Slot persistence ──────────────────────────────────────────
function defaultSlotData() {
  return {
    title:    "",
    entrants: JSON.parse(JSON.stringify(DEFAULT_ENTRANTS)),
    settings: { ...SETTINGS_DEFAULTS },
  };
}

function loadSlotData(slot) {
  try {
    const raw = localStorage.getItem(SLOT_KEY(slot));
    if (!raw) return defaultSlotData();
    const d = JSON.parse(raw);
    return {
      title:    d.title    ?? "",
      entrants: Array.isArray(d.entrants) && d.entrants.length ? d.entrants : JSON.parse(JSON.stringify(DEFAULT_ENTRANTS)),
      settings: { ...SETTINGS_DEFAULTS, ...(d.settings ?? {}), customImages: { ...(d.settings?.customImages ?? {}) }, customSounds: { ...(d.settings?.customSounds ?? {}) } },
    };
  } catch { return defaultSlotData(); }
}

function saveCurrentSlot() {
  if (!activeSlot) return;
  localStorage.setItem(SLOT_KEY(activeSlot), JSON.stringify({
    title:    slotTitle,
    entrants: entrants,
    settings: settings,
  }));
}

// ── Load a slot into live state ───────────────────────────────
function activateSlot(slotId) {
  activeSlot = slotId;
  localStorage.setItem(ACTIVE_SLOT_KEY, slotId);

  const data  = loadSlotData(slotId);
  slotTitle   = data.title;
  entrants    = data.entrants;
  settings    = data.settings;
  initCustomImagesFromProbed();
  rebuildEmojiVariantsFromSettings();
  if (typeof reloadSounds === "function" && audioCtx) reloadSounds();

  updateWheelTitle();
  applySettingsToInputs();
  renderEntrants();
  updateStats();
  resetWheelState();
  renderWheelList();
}

// ── Wheel list UI ─────────────────────────────────────────────
function renderWheelList() {
  wheelListEl.innerHTML = "";
  wheelList.forEach(wheel => {
    const row = document.createElement("div");
    row.className = "wheel-row" + (wheel.id === activeSlot ? " active-wheel" : "");

    const radio    = document.createElement("input");
    radio.type     = "radio";
    radio.name     = "activeWheel";
    radio.checked  = wheel.id === activeSlot;
    radio.onchange = () => {
      if (spinning) return;
      saveCurrentSlot();
      activateSlot(wheel.id);
    };

    const titleInput       = document.createElement("input");
    titleInput.type           = "text";
    titleInput.name           = "bw-wheel-title-row";
    titleInput.autocomplete   = "off";
    titleInput.autocapitalize = "off";
    titleInput.spellcheck     = false;
    titleInput.readOnly       = true; // Safari contact-autofill suppression
    titleInput.setAttribute("autocorrect",       "off");
    titleInput.setAttribute("aria-autocomplete", "none");
    titleInput.addEventListener("focus", () => { titleInput.readOnly = false; }, { once: true });
    titleInput.className   = "wheel-title-edit";
    titleInput.value       = wheel.title;
    titleInput.placeholder = "Wheel title…";
    titleInput.oninput     = () => {
      wheel.title = titleInput.value;
      saveWheelList();
      if (wheel.id === activeSlot) {
        slotTitle = wheel.title;
        updateWheelTitle();
        saveCurrentSlot();
      } else {
        // Persist the new title into the slot's own storage entry so that
        // loadSlotData() returns the correct title when this wheel is activated.
        const slotData = loadSlotData(wheel.id);
        slotData.title = wheel.title;
        localStorage.setItem(SLOT_KEY(wheel.id), JSON.stringify(slotData));
      }
    };

    const deleteBtn       = document.createElement("button");
    deleteBtn.className   = "remove-btn";
    deleteBtn.textContent = "✕";
    deleteBtn.onclick     = () => deleteWheel(wheel.id);

    row.appendChild(radio);
    row.appendChild(titleInput);
    row.appendChild(deleteBtn);
    wheelListEl.appendChild(row);
  });
  requestAnimationFrame(updateWheelScrollFades);
}

function addWheel(title) {
  const id       = newSlotId();
  const newTitle = title.trim() || `Wheel ${wheelList.length + 1}`;
  wheelList.push({ id, title: newTitle });
  localStorage.setItem(SLOT_KEY(id), JSON.stringify({
    title:    newTitle,
    entrants: JSON.parse(JSON.stringify(DEFAULT_ENTRANTS)),
    settings: { ...SETTINGS_DEFAULTS },
  }));
  saveWheelList();
  saveCurrentSlot();
  activateSlot(id);
  wheelListEl.scrollTop = wheelListEl.scrollHeight;
}

function cloneWheel(sourceId) {
  const source = wheelList.find(w => w.id === sourceId);
  if (!source) return;
  const id       = newSlotId();
  const newTitle = source.title ? source.title + " (copy)" : "Copy";
  const srcData  = loadSlotData(sourceId);
  wheelList.push({ id, title: newTitle });
  localStorage.setItem(SLOT_KEY(id), JSON.stringify({ ...srcData, title: newTitle }));
  saveWheelList();
  saveCurrentSlot();
  activateSlot(id);
  wheelListEl.scrollTop = wheelListEl.scrollHeight;
}

function deleteWheel(id) {
  if (wheelList.length <= 1) {
    const idx = wheelList.findIndex(w => w.id === id);
    if (idx === -1) return;
    localStorage.removeItem(SLOT_KEY(id));
    wheelList.splice(idx, 1);
    saveWheelList();
    addWheel("Wheel 1");
    return;
  }
  const idx = wheelList.findIndex(w => w.id === id);
  if (idx === -1) return;
  wheelList.splice(idx, 1);
  localStorage.removeItem(SLOT_KEY(id));
  saveWheelList();
  if (activeSlot === id) {
    activateSlot(wheelList[Math.min(idx, wheelList.length - 1)].id);
  } else {
    renderWheelList();
  }
}

// ── Wheel title ───────────────────────────────────────────────
const WHEEL_TITLE_MIN_FONT = 14;
const WHEEL_TITLE_MAX_FONT = 72;

function updateWheelTitle() {
  const txt = slotTitle.trim();
  wheelTitleText.textContent = txt;
  wheelTitleText.classList.toggle("visible", txt.length > 0);
  fitWheelTitle();
}

// Pick the largest integer font-size in [MIN, MAX] that lets the title
// render on a single line within the wheel-title container. Binary search
// over font sizes (~6 layout queries per call). Called whenever the title
// text or the container width can change.
function fitWheelTitle() {
  const txt = slotTitle.trim();
  if (!txt) return;
  const container = wheelTitleText.parentElement;
  if (!container) return;
  const cs   = getComputedStyle(container);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const avail = container.clientWidth - padX;
  if (avail <= 0) return;

  let lo = WHEEL_TITLE_MIN_FONT, hi = WHEEL_TITLE_MAX_FONT;
  while (lo < hi) {
    const mid = Math.floor((lo + hi + 1) / 2);
    wheelTitleText.style.fontSize = mid + "px";
    if (wheelTitleText.scrollWidth <= avail) lo = mid;
    else                                     hi = mid - 1;
  }
  wheelTitleText.style.fontSize = lo + "px";
}

function makeUrlRow(state, url, idx) {
  const row = document.createElement("div");
  row.className = "img-url-item";

  const input = document.createElement("input");
  input.type = "text";
  input.className = "img-url-edit";
  input.value = url;
  input.title = url;

  const commit = () => {
    const val = input.value.trim();
    if (val === url) return;
    if (val) {
      settings.customImages[state][idx] = val;
    } else {
      settings.customImages[state].splice(idx, 1);
    }
    rebuildEmojiVariantsFromSettings();
    saveCurrentSlot();
    renderImageSettings();
  };
  input.addEventListener("blur", commit);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter")  { input.blur(); }
    if (e.key === "Escape") { input.value = url; input.blur(); }
  });

  const removeBtn = document.createElement("button");
  removeBtn.textContent = "✕";
  removeBtn.className = "img-remove-btn";
  removeBtn.onmousedown = e => e.preventDefault(); // keep input focused until click fires
  removeBtn.onclick = () => {
    settings.customImages[state].splice(idx, 1);
    rebuildEmojiVariantsFromSettings();
    saveCurrentSlot();
    renderImageSettings();
  };

  row.appendChild(input);
  row.appendChild(removeBtn);
  return row;
}

  excited:  ["images/bascaPog.png"],

};

// EMOJI_VARIANTS: active url list per state (customImages overrides DEFAULT_IMAGES).
const EMOJI_VARIANTS  = {};
let currentEmojiState = "idle";

function rebuildEmojiVariantsFromSettings() {
  Object.keys(EMOJI).forEach(state => {
    const list = settings.customImages?.[state];
    EMOJI_VARIANTS[state] = (Array.isArray(list) && list.length > 0)
      ? [...list]
      : [`images/${state}.png`];
  });
}

// Seed settings.customImages with DEFAULT_IMAGES for any state not yet configured,
// so users can see and manage the defaults in the UI.
function initCustomImagesFromProbed() {
  if (!settings.customImages) settings.customImages = {};
  let changed = false;
  Object.keys(EMOJI).forEach(state => {
    if (DEFAULT_IMAGES[state]?.length > 0 && !Array.isArray(settings.customImages[state])) {
      settings.customImages[state] = [...DEFAULT_IMAGES[state]];
      changed = true;
    }
  });
  return changed;
}

// requestAnimationFrame ensures setEmoji runs at the start of a render frame,
// after resizeCanvas has already set wheelEmoji's position and font-size,
// so translate(-50%,-50%) resolves against the correct element dimensions.
requestAnimationFrame(() => {
  if (!spinning && !winnerShowing) setEmoji(currentEmojiState);
});

function setEmoji(state) {
  currentEmojiState = state;
  const fallback = EMOJI[state] || "🙂";
  const variants  = EMOJI_VARIANTS[state];

  wheelEmoji.textContent = "";

  if (!variants || variants.length === 0) {
    wheelEmoji.textContent = fallback;
  } else {
    const url = variants[Math.floor(Math.random() * variants.length)];
    const img = document.createElement("img");
    img.alt       = fallback;
    img.draggable = false;
    img.onerror   = () => {
      if (img.parentNode !== wheelEmoji) return; // cancelled load, not a real failure
      const idx = EMOJI_VARIANTS[state]?.indexOf(url) ?? -1;
      if (idx !== -1) EMOJI_VARIANTS[state].splice(idx, 1);
      if (EMOJI_VARIANTS[state]?.length > 0) setEmoji(state);
      else wheelEmoji.textContent = fallback;
    };
    img.src = url;
    wheelEmoji.appendChild(img);
  }

  wheelEmoji.classList.remove("excited", "nervous", "shocked", "mischief");
  if (state === "excited")  wheelEmoji.classList.add("excited");
  if (state === "nervous")  wheelEmoji.classList.add("nervous");
  if (state === "shocked" || state === "relieved") wheelEmoji.classList.add("shocked");
  if (["speed","slowdown","swap","reverse","explode"].includes(state))
    wheelEmoji.classList.add("mischief");
}

// ── Layout ────────────────────────────────────────────────────
function resizeCanvas() {
  const rect    = wheelWrap.getBoundingClientRect();
  canvas.width  = rect.width;
  canvas.height = rect.height;
  const titleReserve = 80;
  wheelCX     = canvas.width / 2;
  wheelRadius = Math.min(canvas.width / 2 - 16, (canvas.height - titleReserve) / 2 - 16);
  wheelCY     = canvas.height / 2 + titleReserve / 2;
  pointer.style.left = (wheelCX + wheelRadius - 20) + "px";
  pointer.style.top  = wheelCY + "px";
  const emojiPx = Math.round(wheelRadius * 0.36 * 1.4);
  wheelEmoji.style.left     = wheelCX + "px";
  wheelEmoji.style.top      = wheelCY + "px";
  wheelEmoji.style.fontSize = (wheelRadius * 0.36) + "px";
  wheelEmoji.style.width    = emojiPx + "px";
  wheelEmoji.style.height   = emojiPx + "px";
  fitWheelTitle();
  syncOverlayToWheelPanel();
  drawWheel();
}
window.addEventListener("resize", () => {
  resizeCanvas();
  if (window.innerWidth <= 640 && !sidebarVisible) {
    sidebarWrapper.style.width = "";
    sidebarWrapper.style.overflow = "";
    document.querySelector(".app").classList.remove("sidebar-collapsed");
    sidebarVisible = true;
    panelToggle.textContent = "<";
    panelToggle.title = "Hide panel";
  }
  // Re-evaluate scroll fades: when crossing the mobile breakpoint the lists
  // switch to overflow:visible, so the show-classes set by previous scroll
  // events are now stale. The fade conditions (scrollTop > 2 / scrollTop +
  // clientHeight < scrollHeight - 2) become false and the fades hide.
  updateScrollFades();
  updateWheelScrollFades();
});

// ── Wheel math ────────────────────────────────────────────────
function totalWeight() { return entrants.reduce((s, e) => s + e.weight, 0); }

function pointerAngle(rotation) {
  return ((-(rotation % (Math.PI * 2))) + Math.PI * 2) % (Math.PI * 2);
}

function getSliceIndexAt(rotation) {
  const total = totalWeight();
  const pa    = pointerAngle(rotation);
  let   cum   = 0;
  for (let i = 0; i < entrants.length; i++) {
    cum += entrants[i].weight / total * Math.PI * 2;
    if (pa < cum) return i;
  }
  return 0;
}

function getWinnerAtRotation(rotation) { return entrants[getSliceIndexAt(rotation)]; }

function pointerNearSliceEdge(rotation) {
  if (!entrants.length) return false;
  const total = totalWeight();
  const pa    = pointerAngle(rotation);
  const THRESHOLD = 0.06;
  let   cum   = 0;
  for (const e of entrants) {
    const end = cum + e.weight / total * Math.PI * 2;
    if (Math.abs(pa - cum) < THRESHOLD || Math.abs(pa - end) < THRESHOLD) return true;
    cum = end;
  }
  return false;
}

// ── Draw ──────────────────────────────────────────────────────
function drawWheel(rotation = currentRotation) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const cx = wheelCX;
  const cy = wheelCY;

  if (!entrants.length) {
    ctx.beginPath();
    ctx.arc(cx, cy, wheelRadius, 0, Math.PI * 2);
    ctx.fillStyle = "#334155";
    ctx.fill();
    return;
  }

  const total = totalWeight();
  let startAngle = rotation;

  entrants.forEach((e, i) => {
    const slice    = e.weight / total * Math.PI * 2;
    const endAngle = startAngle + slice;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, wheelRadius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle   = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.lineWidth   = 4;
    ctx.strokeStyle = "#0f172a";
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + slice / 2);
    ctx.fillStyle = "white";
    ctx.font      = `bold ${Math.max(12, wheelRadius * 0.045)}px Arial`;
    ctx.textAlign = "right";
    const label   = nobodyWinsActive
      ? "Nobody"
      : `${e.name} (${(e.weight / total * 100).toFixed(1)}%)`;
    ctx.fillText(label, wheelRadius - 20, 8);
    ctx.restore();

    startAngle = endAngle;
  });
}

// ── Pointer tick ──────────────────────────────────────────────
function triggerPointerTick(cwSpin) {
  pointer.classList.remove("tick-cw", "tick-ccw");
  pointer.style.animation = "none";
  void pointer.offsetWidth;
  pointer.style.animation = "";
  pointer.classList.add(cwSpin ? "tick-cw" : "tick-ccw");
  playTick();
}

function updatePointerTick(rotation) {
  if (!entrants.length) return;
  const idx = getSliceIndexAt(rotation);
  if (idx !== previousSliceIdx) {
    const cw = prevTickRotation === null || (rotation - prevTickRotation) >= 0;
    triggerPointerTick(cw);
    previousSliceIdx = idx;
  }
  prevTickRotation = rotation;
}

// ── Render sidebar ────────────────────────────────────────────
function renderEntrants() {
  entrantListEl.innerHTML = "";
  entrants.forEach((entrant, index) => {
    const row = document.createElement("div");
    row.className = "entrant";

    const nameInput     = document.createElement("input");
    nameInput.value          = entrant.name;
    nameInput.maxLength      = 256;
    nameInput.name           = "bw-entrant-row";
    nameInput.autocomplete   = "off";
    nameInput.autocapitalize = "off";
    nameInput.spellcheck     = false;
    nameInput.readOnly       = true; // Safari contact-autofill suppression
    nameInput.setAttribute("autocorrect",       "off");
    nameInput.setAttribute("aria-autocomplete", "none");
    nameInput.addEventListener("focus", () => { nameInput.readOnly = false; }, { once: true });
    nameInput.oninput   = () => { entrant.name = nameInput.value; saveEntrants(); resetWheelState(); };

    const ctrl  = document.createElement("div");
    ctrl.className = "weight-control";

    const minus = document.createElement("button");
    minus.className = "weight-btn"; minus.textContent = "−";

    const plus  = document.createElement("button");
    plus.className = "weight-btn"; plus.textContent = "+";

    const wInput = document.createElement("input");
    wInput.type = "number"; wInput.className = "weight-input"; wInput.value = entrant.weight;

    minus.onclick = () => {
      entrant.weight = Math.max(1, entrant.weight - 1);
      wInput.value   = entrant.weight;
      saveEntrants(); updateStats(); resetWheelState();
    };
    plus.onclick = () => {
      entrant.weight++; wInput.value = entrant.weight;
      saveEntrants(); updateStats(); resetWheelState();
    };
    wInput.oninput = () => {
      entrant.weight = Math.max(1, parseInt(wInput.value) || 1);
      wInput.value   = entrant.weight;
      saveEntrants(); updateStats(); resetWheelState();
    };

    ctrl.appendChild(minus); ctrl.appendChild(wInput); ctrl.appendChild(plus);

    const removeBtn = document.createElement("button");
    removeBtn.className = "remove-btn"; removeBtn.textContent = "✕";
    removeBtn.onclick = () => {
      entrants.splice(index, 1);
      saveEntrants(); renderEntrants(); updateStats(); resetWheelState();
    };

    row.appendChild(nameInput); row.appendChild(ctrl); row.appendChild(removeBtn);
    entrantListEl.appendChild(row);
  });
  requestAnimationFrame(updateScrollFades);
}

function updateStats() {
  statsDiv.innerHTML = `Total Entrants: <b>${entrants.length}</b> Total Weight: <b>${totalWeight()}</b>`;
}

function resetWheelState() {
  stopIdleRotation();
  stopConfettiBursts();
  currentRotation  = 0;
  spinning         = false;
  wasNearEdge      = false;
  nobodyWinsActive = false;
  winnerShowing    = false;
  wheelWrap.classList.remove("flames-paused");
  previousSliceIdx = -1;
  prevTickRotation = null;
  setEmoji("idle");
  winnerOverlay.classList.remove("show");
  drawWheel();
  startIdleRotation();
}

function parseEntrantInput(text) {
  let name = text.trim(), weight = 1;
  const m  = name.match(/^(.*?),\s*(\d+)$/);
  if (m) { name = m[1].trim(); weight = Math.max(1, parseInt(m[2])); }
  return { name, weight };
}

function addEntrant() {
  const raw = document.getElementById("nameInput").value.trim();
  if (!raw) return;
  entrants.push(parseEntrantInput(raw));
  saveEntrants(); renderEntrants(); updateStats(); resetWheelState();
  document.getElementById("nameInput").value = "";
}

// ── Effects ───────────────────────────────────────────────────
// Continuous confetti bursts from the edges of the winner popup. Started
// from finishSpin() and stopped when the user dismisses the winner (or the
// wheel state is reset via resetWheelState).
let confettiBurstId = null;

function spawnConfetti(x, y, baseAngle, spreadRad) {
  const c = document.createElement("div");
  c.className = "burst-confetti";
  c.style.left = x + "px";
  c.style.top  = y + "px";
  c.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];
  const sz = (6 + Math.random() * 10) + "px";
  c.style.width = c.style.height = sz;

  // Outward velocity along (baseAngle ± spread/2), plus a downward gravity
  // bias added to ty so every particle eventually falls regardless of side.
  const angle = baseAngle + (Math.random() - 0.5) * spreadRad;
  const speed = 240 + Math.random() * 360;
  const tx = Math.cos(angle) * speed;
  const ty = Math.sin(angle) * speed + 220 + Math.random() * 320;
  const tr = (Math.random() - 0.5) * 720;
  c.style.setProperty("--tx", tx + "px");
  c.style.setProperty("--ty", ty + "px");
  c.style.setProperty("--tr", tr + "deg");

  const dur = 1.5 + Math.random() * 1.5;
  c.style.animationDuration = dur + "s";
  document.body.appendChild(c);
  setTimeout(() => c.remove(), dur * 1000 + 100);
}

// Cubic bezier segments of the heart clip-path (objectBoundingBox, 0-1).
// Mirrors the path in #heart-clip exactly so confetti spawns on the outline.
const HEART_SEGS = [
  [[0.50,0.25],[0.50,0.18],[0.43,0.11],[0.33,0.11]],
  [[0.33,0.11],[0.16,0.11],[0.05,0.26],[0.05,0.43]],
  [[0.05,0.43],[0.05,0.68],[0.50,0.93],[0.50,0.93]],
  [[0.50,0.93],[0.50,0.93],[0.95,0.68],[0.95,0.43]],
  [[0.95,0.43],[0.95,0.26],[0.84,0.11],[0.67,0.11]],
  [[0.67,0.11],[0.57,0.11],[0.50,0.18],[0.50,0.25]],
];
const HEART_CX = 0.50, HEART_CY = 0.52; // approximate visual centre

function sampleHeartOutline(box, n) {
  const pts = [];
  const perSeg = Math.ceil(n / HEART_SEGS.length);
  for (const [[x0,y0],[x1,y1],[x2,y2],[x3,y3]] of HEART_SEGS) {
    for (let i = 0; i < perSeg; i++) {
      const t = i / perSeg, mt = 1 - t;
      const nx = mt*mt*mt*x0 + 3*mt*mt*t*x1 + 3*mt*t*t*x2 + t*t*t*x3;
      const ny = mt*mt*mt*y0 + 3*mt*mt*t*y1 + 3*mt*t*t*y2 + t*t*t*y3;
      pts.push({ x: box.left + nx * box.width, y: box.top + ny * box.height });
    }
  }
  return pts;
}

function startConfettiBursts() {
  if (confettiBurstId) return;
  const wave = () => {
    const box = winnerBox.getBoundingClientRect();
    if (!box.width) return;
    // Only spawn from the lower sides and bottom — exclude the top lobe
    // area (ny < 0.30) so confetti never shoots upward off the top of the heart.
    const outline = sampleHeartOutline(box, 120).filter(
      pt => (pt.y - box.top) / box.height > 0.30
    );
    if (!outline.length) return;
    const cx = box.left + HEART_CX * box.width;
    const cy = box.top  + HEART_CY * box.height;
    for (let i = 0; i < 100; i++) {
      const pt = outline[Math.floor(Math.random() * outline.length)];
      const angle = Math.atan2(pt.y - cy, pt.x - cx);
      spawnConfetti(pt.x, pt.y, angle, Math.PI * 0.45);
    }
  };
  wave();
  confettiBurstId = setInterval(wave, 700);
}

function stopConfettiBursts() {
  if (confettiBurstId) {
    clearInterval(confettiBurstId);
    confettiBurstId = null;
  }
}

// Shrink winner-name font until the text occupies at most MAX_LINES lines.
// The heart's lobe clips the top of the box, so 4+ lines cause the first
// line to be cut; 3 lines is the safe maximum at any font size.
// Threshold = ceil(MAX_LINES × px × line-height) + 2px rounding buffer.
// Binary search: O(log n) reflows instead of O(n).
function fitWinnerText() {
  const MAX_PX        = 52;
  const MIN_PX        = 11;
  const MAX_LINES     = 3;
  const LINE_H_RATIO  = 1.1; // matches CSS line-height on .winner-name

  function fits(px) {
    winnerName.style.fontSize = px + 'px';
    return winnerName.offsetHeight <= Math.ceil(MAX_LINES * px * LINE_H_RATIO) + 2;
  }

  if (fits(MAX_PX)) return; // common case: short name fits at full size

  let lo = MIN_PX, hi = MAX_PX - 1;
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2);
    if (fits(mid)) lo = mid;
    else hi = mid - 1;
  }
  winnerName.style.fontSize = lo + 'px';
}

function launchExplosion() {
  const cols = ["#ef4444","#f97316","#fbbf24","#fff","#f43f5e"];
  const imageStates = Object.keys(EMOJI_VARIANTS)
    .filter(s => EMOJI_VARIANTS[s] && EMOJI_VARIANTS[s].length > 0);

  // ── Confetti shards: a dozen blasts at random viewport positions ────────
  const NUM_SHARD_BLASTS = 12;
  const SHARDS_PER_BLAST = 8;
  for (let b = 0; b < NUM_SHARD_BLASTS; b++) {
    const cx = 8 + Math.random() * 84; // vw
    const cy = 8 + Math.random() * 84; // vh
    for (let i = 0; i < SHARDS_PER_BLAST; i++) {
      const s = document.createElement("div");
      s.className = "shard";
      s.style.left = cx + "vw"; s.style.top = cy + "vh";
      s.style.width  = (4 + Math.random() * 14) + "px";
      s.style.height = (3 + Math.random() * 8)  + "px";
      s.style.background = cols[Math.floor(Math.random() * cols.length)];
      const angle = Math.random() * Math.PI * 2;
      const speed = 150 + Math.random() * 400;
      s.style.setProperty("--tx", (Math.cos(angle) * speed) + "px");
      s.style.setProperty("--ty", (Math.sin(angle) * speed) + "px");
      s.style.setProperty("--tr", ((Math.random() - 0.5) * 1080) + "deg");
      const dur = 0.8 + Math.random() * 1.0;
      s.style.animationDuration = dur + "s";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), dur * 1000 + 100);
    }
  }

  // ── Wheel-image debris: tightly clustered at the wheel centre, all
  //    fired radially outward (as if the wheel itself shattered). ──
  if (imageStates.length > 0) {
    const wrapRect       = wheelWrap.getBoundingClientRect();
    const centerX        = wrapRect.left + wheelCX;       // viewport px
    const centerY        = wrapRect.top  + wheelCY;
    const NUM_IMAGES     = 36;
    const CLUSTER_RADIUS = Math.max(40, wheelRadius * 0.25); // tight pack

    for (let i = 0; i < NUM_IMAGES; i++) {
      const state    = imageStates[Math.floor(Math.random() * imageStates.length)];
      const variants = EMOJI_VARIANTS[state];
      const url      = variants[Math.floor(Math.random() * variants.length)];

      // Polar spawn near centre; the SAME angle is used for the launch
      // direction so every piece flies straight outward from the centre.
      const angle    = Math.random() * Math.PI * 2;
      const offsetR  = Math.random() * CLUSTER_RADIUS;
      const spawnX   = centerX + Math.cos(angle) * offsetR;
      const spawnY   = centerY + Math.sin(angle) * offsetR;

      const img = document.createElement("img");
      img.className = "explode-img";
      img.alt       = "";
      img.draggable = false;
      img.src       = url;

      const size = 44 + Math.random() * 60; // 44–104 px
      img.style.width  = size + "px";
      img.style.height = size + "px";
      img.style.left   = (spawnX - size / 2) + "px";
      img.style.top    = (spawnY - size / 2) + "px";

      const speed = 350 + Math.random() * 700;
      img.style.setProperty("--tx", (Math.cos(angle) * speed) + "px");
      img.style.setProperty("--ty", (Math.sin(angle) * speed) + "px");
      img.style.setProperty("--tr", ((Math.random() - 0.5) * 1440) + "deg");
      const dur = 1.0 + Math.random() * 1.5;
      img.style.animationDuration = dur + "s";

      document.body.appendChild(img);
      setTimeout(() => img.remove(), dur * 1000 + 100);
    }
  }

  document.body.classList.remove("shaking");
  void document.body.offsetWidth;
  document.body.classList.add("shaking");
  setTimeout(() => document.body.classList.remove("shaking"), 600);
}

function randomSwap() {
  if (entrants.length < 2) return;
  let a = Math.floor(Math.random() * entrants.length), b;
  do { b = Math.floor(Math.random() * entrants.length); } while (b === a);
  [entrants[a], entrants[b]] = [entrants[b], entrants[a]];
  renderEntrants(); saveEntrants();
}

// ── Nobody wins ───────────────────────────────────────────────
function doNobodyWins() {
  nobodyWinsActive = true;
  fadeBgOut(600);
  playSound("explode");
  // Fire the explosion (debris + screen shake) on the trigger, in sync with
  // the sound — not after the blastSpin finishes. The wheel keeps spinning
  // out behind the debris for ~1.2s and only THEN the "Nobody wins" UI shows.
  launchExplosion();
  const startRot   = currentRotation;
  const blastDur   = 1200;
  const blastStart = performance.now();
  setEmoji("explode");

  function blastSpin(now) {
    const t = Math.min((now - blastStart) / blastDur, 1);
    currentRotation = startRot + Math.PI * 2 * 3 * (t - t * t * 0.5);
    drawWheel(currentRotation);
    updateFlameSpeed(currentRotation, now);
    if (t < 1) { requestAnimationFrame(blastSpin); return; }

    setEmoji("nobody");
    winnerTitle.textContent   = "💥 UH OH, IT'S BROKEN! 💥";
    winnerTitle.classList.add("bad");
    winnerBox.classList.add("exploded");
    winnerName.style.fontSize = "36px";
    winnerName.style.color    = "#ef4444";
    winnerName.textContent    = "Nobody wins!";
    syncOverlayToWheelPanel(true);
    winnerOverlay.classList.add("show");
    winnerShowing = true;
    wheelWrap.classList.add("flames-paused");
    setTimeout(() => { winnerName.style.fontSize = ""; }, 100);
  }
  requestAnimationFrame(blastSpin);
}

// ── Main spin ─────────────────────────────────────────────────
function spinWheel() {
  if (spinning || !entrants.length) return;

  stopIdleRotation();
  initAudio().then(startBg);
  document.getElementById("settingsOverlay").classList.add("hidden");

  nobodyWinsActive = false;
  winnerShowing    = false;
  wheelWrap.classList.remove("flames-paused");
  winnerOverlay.classList.remove("show");

  spinning         = true;
  wasNearEdge      = false;
  previousSliceIdx = -1;
  prevTickRotation = null;
  setEmoji("excited");

  // Spin Time slider (0..100) maps to a base-time multiplier.
  // Default 33 ≈ 1.0× (preserves the historical spin feel); 0 ≈ 0.3×, 100 ≈ 2.4×.
  // Only the *base* timings/rotations are scaled — every sub-roll stays random,
  // so the actual landing time still has plenty of unpredictability.
  const spinTimeMultiplier = 0.3 + (settings.spinTime / 100) * 2.1;

  const spinStartRotation = currentRotation;
  const nobodyDelay  = (1000 + Math.random() * 1000) * spinTimeMultiplier;
  let   nobodyChecked = false;

  let   cwDuration   = 9800 * spinTimeMultiplier;
  const cwBase       = Math.PI * 2 * (10 + Math.random() * 6) * spinTimeMultiplier;
  const cwExtra      = Math.random() * Math.PI * 2;
  let   cwStart      = performance.now();
  let   cwStartRot   = spinStartRotation;
  let   cwTotalAngle = cwBase + cwExtra;

  const earlyTime = (600 + Math.random() * 1000) * spinTimeMultiplier;
  const midTime   = cwDuration * 0.38 + Math.random() * 800;
  const boostTime = cwDuration * 0.62 + Math.random() * 600;
  const swapTime  = cwDuration * 0.75 + Math.random() * 600;
  let   earlyDone = false, midDone = false, boostDone = false, swapDone = false;

  function cwAnimate(now) {
    const elapsed = now - cwStart;

    if (!nobodyChecked && elapsed >= nobodyDelay) {
      nobodyChecked = true;
      if (Math.random() * 100 < settings.explodeChance) {
        spinning = false;
        doNobodyWins();
        return;
      }
    }

    if (!earlyDone && elapsed >= earlyTime) {
      earlyDone = true;
      if (Math.random() * 100 < settings.slowChance) {
        const remainder  = (1800 + Math.random() * 800) * spinTimeMultiplier;
        const tNow       = elapsed / cwDuration;
        const easedNow   = 1 - Math.pow(1 - Math.pow(Math.min(tNow, 0.99), 1), 7);
        const travelSoFar= cwTotalAngle * easedNow;
        cwTotalAngle = travelSoFar + Math.PI * 2 * (1 + Math.random());
        cwStartRot   = currentRotation;
        cwStart      = now;
        cwDuration   = remainder;
        setEmoji("slowdown");
        playSound("slowdown");
        setTimeout(() => { if (spinning) setEmoji("excited"); }, 900);
      }
    }

    if (!midDone && elapsed >= midTime) {
      midDone = true;
      if (Math.random() * 100 < settings.reverseChance) {
        setEmoji("reverse");
        playSound("reverse");
        setTimeout(() => { if (spinning) setEmoji("excited"); }, 1500);
        startCCWDecel();
        return;
      }
    }

    if (!boostDone && elapsed >= boostTime) {
      boostDone = true;
      if (Math.random() * 100 < settings.speedChance) {
        cwStartRot   = currentRotation;
        cwStart      = now;
        cwDuration   = (5000 + Math.random() * 3000) * spinTimeMultiplier;
        cwTotalAngle = Math.PI * 2 * (5 + Math.random() * 5) * spinTimeMultiplier;
        setEmoji("speed");
        playSound("boost");
        setTimeout(() => { if (spinning) setEmoji("excited"); }, 1200);
      }
    }

    if (!swapDone && elapsed >= swapTime) {
      swapDone = true;
      if (Math.random() * 100 < settings.swapChance) {
        randomSwap();
        setEmoji("swap");
        playSound("shuffle");
        setTimeout(() => { if (spinning) setEmoji("excited"); }, 1200);
      }
    }

    const t     = Math.min((now - cwStart) / cwDuration, 1);
    const eased = 1 - Math.pow(1 - t, 4);
    currentRotation = cwStartRot + cwTotalAngle * eased;

    drawWheel(currentRotation);
    updatePointerTick(currentRotation);
    updateNervousEmoji(t);
    updateFlameSpeed(currentRotation, now);

    if (t < 1) { requestAnimationFrame(cwAnimate); }
    else        { finishSpin(); }
  }

  function startCCWDecel() {
    const ccwStartRot   = currentRotation;
    const ccwStart      = performance.now();
    const ccwTotalAngle = Math.PI * 2 * (4 + Math.random() * 4) * spinTimeMultiplier;
    const ccwDuration   = (7000 + Math.random() * 2000) * spinTimeMultiplier;

    const ccwBoostTime = ccwDuration * 0.25 + Math.random() * 800;
    const ccwSwapTime  = ccwDuration * 0.45 + Math.random() * 600;
    let ccwBoostDone = false, ccwSwapDone = false;
    let ccwStartRotCur = ccwStartRot;
    let ccwStartTime   = ccwStart;
    let ccwTotal       = ccwTotalAngle;
    let ccwDur         = ccwDuration;

    function ccwAnimate(now) {
      const elapsed = now - ccwStartTime;

      if (!ccwBoostDone && elapsed >= ccwBoostTime) {
        ccwBoostDone = true;
        if (Math.random() * 100 < settings.speedChance) {
          ccwStartRotCur = currentRotation;
          ccwStartTime   = now;
          ccwDur         = (5000 + Math.random() * 2000) * spinTimeMultiplier;
          ccwTotal       = Math.PI * 2 * (4 + Math.random() * 4) * spinTimeMultiplier;
          setEmoji("speed");
          playSound("boost");
          setTimeout(() => { if (spinning) setEmoji("excited"); }, 1200);
        }
      }

      if (!ccwSwapDone && elapsed >= ccwSwapTime) {
        ccwSwapDone = true;
        if (Math.random() * 100 < settings.swapChance) {
          randomSwap();
          setEmoji("swap");
          playSound("shuffle");
          setTimeout(() => { if (spinning) setEmoji("excited"); }, 1200);
        }
      }

      const t     = Math.min((now - ccwStartTime) / ccwDur, 1);
      const eased = 1 - Math.pow(1 - t, 4);
      currentRotation = ccwStartRotCur - ccwTotal * eased;

      drawWheel(currentRotation);
      updatePointerTick(currentRotation);
      updateNervousEmoji(t);
      updateFlameSpeed(currentRotation, now);

      if (t < 1) { requestAnimationFrame(ccwAnimate); }
      else        { finishSpin(); }
    }

    requestAnimationFrame(ccwAnimate);
  }

  function updateNervousEmoji(t) {
    const inSlowZone = t > 0.75 && t < 1.0;
    const nearEdge   = inSlowZone && pointerNearSliceEdge(currentRotation);

    if (nearEdge) {
      if (!wasNearEdge) setEmoji("nervous");
      wasNearEdge = true;
    } else if (wasNearEdge) {
      wasNearEdge = false;
      setEmoji(Math.random() < 0.5 ? "shocked" : "relieved");
      setTimeout(() => { if (spinning) setEmoji("excited"); }, 600);
    } else {
      wasNearEdge = false;
    }
  }

  function finishSpin() {
    spinning         = false;
    wasNearEdge      = false;
    currentRotation  = currentRotation % (Math.PI * 2);
    drawWheel(currentRotation);

    const winner = getWinnerAtRotation(currentRotation);
    winnerTitle.textContent   = "";
    winnerTitle.classList.remove("bad");
    winnerBox.classList.remove("exploded");
    winnerName.textContent    = winner.name;
    winnerName.style.color    = "";
    winnerName.style.fontSize = "";
    fitWinnerText();
    setEmoji("winner");
    syncOverlayToWheelPanel();
    winnerOverlay.classList.add("show");
    winnerShowing = true;
    wheelWrap.classList.add("flames-paused");
    fadeBgOut(800);
    playSound("fanfare");
    startConfettiBursts();
    addToHistory(winner.name);
  }

  requestAnimationFrame(cwAnimate);
}

// ── Raw data backup / restore ─────────────────────────────────
function exportAllData() {
  saveCurrentSlot(); // flush in-memory state into localStorage first
  const wheels = wheelList.map(w => {
    let slot = defaultSlotData();
    try {
      const raw = localStorage.getItem(SLOT_KEY(w.id));
      if (raw) slot = JSON.parse(raw);
    } catch {}
    return {
      id:       w.id,
      title:    w.title,
      entrants: slot.entrants,
      settings: slot.settings,
    };
  });
  return { version: 1, activeSlot, wheels };
}

function importAllData(payload) {
  if (!payload || typeof payload !== "object")
    throw new Error("Top-level value must be an object.");
  if (!Array.isArray(payload.wheels))
    throw new Error("'wheels' must be an array.");
  const cleaned = payload.wheels.filter(w => w && typeof w.id === "string" && w.id);
  if (!cleaned.length)
    throw new Error("'wheels' must contain at least one entry with a string 'id'.");

  // Wipe old per-slot keys so deletions are honoured
  wheelList.forEach(w => localStorage.removeItem(SLOT_KEY(w.id)));

  wheelList = cleaned.map(w => ({
    id:    w.id,
    title: typeof w.title === "string" ? w.title : "",
  }));
  cleaned.forEach(w => {
    const slot = {
      title:    typeof w.title === "string" ? w.title : "",
      entrants: Array.isArray(w.entrants) ? w.entrants : JSON.parse(JSON.stringify(DEFAULT_ENTRANTS)),
      settings: { ...SETTINGS_DEFAULTS, ...(w.settings && typeof w.settings === "object" ? w.settings : {}), customImages: { ...(w.settings?.customImages ?? {}) }, customSounds: { ...(w.settings?.customSounds ?? {}) } },
    };
    localStorage.setItem(SLOT_KEY(w.id), JSON.stringify(slot));
  });
  saveWheelList();

  const targetActive = (typeof payload.activeSlot === "string"
                       && wheelList.find(x => x.id === payload.activeSlot))
    ? payload.activeSlot
    : wheelList[0].id;
  activateSlot(targetActive);
  renderWheelList();
}

const rawDataOverlay   = document.getElementById("rawDataOverlay");
const rawDataText      = document.getElementById("rawDataText");
const rawDataError     = document.getElementById("rawDataError");
const rawDataFileInput = document.getElementById("rawDataFileInput");

function openRawData() {
  rawDataText.value        = JSON.stringify(exportAllData(), null, 2);
  rawDataError.textContent = "";
  rawDataOverlay.classList.add("show");
}
function closeRawData() {
  rawDataOverlay.classList.remove("show");
  rawDataError.textContent = "";
  document.getElementById("settingsOverlay").classList.add("hidden");
}
function applyRawData() {
  let parsed;
  try { parsed = JSON.parse(rawDataText.value); }
  catch (e) { rawDataError.textContent = "Invalid JSON: " + e.message; return false; }
  try { importAllData(parsed); }
  catch (e) { rawDataError.textContent = "Import failed: " + e.message; return false; }
  return true;
}

document.getElementById("rawDataBtn").onclick = openRawData;
document.getElementById("rawDataApply").onclick  = () => { if (applyRawData()) closeRawData(); };
document.getElementById("rawDataCancel").onclick = closeRawData;
rawDataOverlay.addEventListener("click", e => {
  if (e.target === rawDataOverlay) closeRawData();
});

document.getElementById("rawDataSaveBtn").onclick = () => {
  const blob  = new Blob([rawDataText.value], { type: "application/json" });
  const url   = URL.createObjectURL(blob);
  const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
  const a     = document.createElement("a");
  a.href      = url;
  a.download  = `bascawheel-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
};

document.getElementById("rawDataLoadBtn").onclick = () => rawDataFileInput.click();
rawDataFileInput.onchange = async () => {
  const file = rawDataFileInput.files[0];
  if (!file) return;
  try {
    rawDataText.value        = await file.text();
    rawDataError.textContent = "";
  } catch (e) {
    rawDataError.textContent = "Could not read file: " + e.message;
  }
  rawDataFileInput.value = ""; // reset so re-selecting the same file fires change
};
