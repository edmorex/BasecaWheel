<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BascaWheel</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />
<link rel="stylesheet" href="css/basca.css" />
</head>
<body>

<div class="app" id="appEl">
  <button id="panelToggle" class="panel-toggle" title="Hide panel">&lt;</button>

  <div class="sidebar-wrapper" id="sidebarWrapper">
  <div class="panel sidebar">
    <h1><span style="color:#5BCEFA">Ba</span><span style="color:#F5A9B8">se</span><span style="color:#FFFFFF">caW</span><span style="color:#F5A9B8">he</span><span style="color:#5BCEFA">el</span></h1>
    <div class="subtitle" style="color:#ff2d78">A totally legit wheel of chance!</div>

    <!-- ── Wheel list ── -->
    <div class="wheel-list-section">
      <h3>Wheels</h3>
      <div class="wheel-clear-row">
        <button class="bulk-btn" id="saveWheelsBtn">Save</button>
        <button class="bulk-btn" id="loadWheelsBtn">Load</button>
        <button class="primary bulk-btn" id="addWheelBtn">New</button>
      </div>
      <div class="wheel-clear-row">
        <button class="bulk-btn" id="randomizeBtn">Randomize</button>
        <button class="bulk-btn" id="cloneActiveWheelBtn">Clone</button>
        <button class="danger clear-right-btn" id="clearWheelsBtn">Clear All</button>
      </div>
      <div class="wheel-scroll-wrap">
        <div class="scroll-fade top"    id="wheelTopFade">   <div class="scroll-indicator">▲</div></div>
        <div class="wheel-list-scroll"  id="wheelListEl"></div>
        <div class="scroll-fade bottom" id="wheelBottomFade"><div class="scroll-indicator">▼</div></div>
      </div>
    </div>

    <div id="sectionDivider" class="section-divider"><span>⠿</span></div>

    <h3>Entrants</h3>
    <div class="input-row">
      <input id="nameInput" placeholder="Entrant or Entrant,#" name="bw-entrant-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-autocomplete="none" readonly onfocus="this.removeAttribute('readonly')" />
      <button class="primary" id="addBtn">Add</button>
    </div>
    <div class="entrant-controls">
      <button class="bulk-btn" id="minusAllBtn">−1 to All</button>
      <button class="bulk-btn" id="plusAllBtn">+1 to All</button>
      <button class="danger clear-right-btn" id="clearBtn">Clear All</button>
    </div>
    <div class="entrant-section">
      <div class="entrant-scroll-wrap">
        <div class="scroll-fade top"    id="topFade">   <div class="scroll-indicator">▲</div></div>
        <div class="entrant-list"       id="entrantList"></div>
        <div class="scroll-fade bottom" id="bottomFade"><div class="scroll-indicator">▼</div></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="settingsBtn" class="settings-btn">⚙️</button>
      <div class="stats" id="stats"></div>
    </div>
  </div>
  </div>

  <div class="panel wheel-wrap">
    <!-- Wheel title -->
    <div class="wheel-title">
      <span class="wheel-title-text" id="wheelTitleText"></span>
    </div>

    <div class="pointer" id="pointer"></div>
    <canvas id="wheel"></canvas>
    <div class="wheel-emoji" id="wheelEmoji">😻</div>

    <div class="winner-overlay" id="winnerOverlay">
      <div class="winner-heart-wrap" id="winnerHeartWrap">
        <div class="winner-box" id="winnerBox">
          <div class="winner-title" id="winnerTitle">🎉 WINNER 🎉</div>
          <div class="winner-name"  id="winnerName"></div>
        </div>
      </div>
    </div>

    <button id="muteBtn" class="mute-btn" title="Mute sounds">🔊</button>
    <button id="historyBtn" class="history-btn" title="Show winner history">🗒️</button>
    <div id="historyList" class="history-list hidden"></div>
  </div>
</div>

<!-- ── Heart clip-path definition ── -->
<svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
  <defs>
    <!-- objectBoundingBox coords (0–1): heart with lobes at top, point at bottom -->
    <clipPath id="heart-clip" clipPathUnits="objectBoundingBox">
      <path d="M 0.5,0.25
               C 0.5,0.18 0.43,0.11 0.33,0.11
               C 0.16,0.11 0.05,0.26 0.05,0.43
               C 0.05,0.68 0.5,0.93 0.5,0.93
               C 0.5,0.93 0.95,0.68 0.95,0.43
               C 0.95,0.26 0.84,0.11 0.67,0.11
               C 0.57,0.11 0.5,0.18 0.5,0.25 Z"/>
    </clipPath>
  </defs>
</svg>

<!-- ── Confirmation modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-actions">
      <button class="danger" id="modalConfirm">Delete</button>
      <button id="modalCancel">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Raw Data modal ── -->
<div class="modal-overlay" id="rawDataOverlay">
  <div class="raw-data-box">
    <h3 class="raw-data-title">📦 Raw Data</h3>
    <p class="raw-data-hint">All wheels, entrants, and settings as JSON. Edit or paste directly. Clicking "Save &amp; Close" imports any changes.</p>
    <textarea id="rawDataText" spellcheck="false"></textarea>
    <div class="raw-data-error" id="rawDataError"></div>
    <div class="raw-data-actions">
      <button id="rawDataCancel">Cancel</button>
      <button id="rawDataApply" class="primary">Save &amp; Close</button>
    </div>
  </div>
</div>
<input type="file" id="rawDataFileInput" accept=".json,application/json,text/plain" style="display:none" />

<!-- ── Mischief Settings modal ── -->
<div id="settingsOverlay" class="settings-overlay hidden">
  <div id="settingsPanel" class="settings-panel">
    <div class="settings-panel-header">
      <h3>😈 Mischief Settings</h3>
      <button id="rawDataBtn" class="settings-close-btn">📦 Edit Raw Data</button>
    </div>
    <div class="settings-body-wrap">
      <div class="scroll-fade top"    id="settingsTopFade">   <div class="scroll-indicator">▲</div></div>
      <div class="settings-panel-body" id="settingsPanelBody">
        <div class="settings-left-col">
          <section class="settings-section">
            <div class="settings-section-title">Chances</div>
            <label>⏱️ Spin Time      <input type="range"  id="spinTime"      min="0" max="100" step="1" /></label>
            <label>💥 Explode %      <input type="number" id="explodeChance" min="0" max="100" step="1" /></label>
            <label>🔄 Reverse Spin % <input type="number" id="reverseChance" min="0" max="100" step="1" /></label>
            <label>🫣 Slowdown %     <input type="number" id="slowChance"    min="0" max="100" step="1" /></label>
            <label>😜 Boost %        <input type="number" id="speedChance"   min="0" max="100" step="1" /></label>
            <label>🌀 Late Shuffle % <input type="number" id="swapChance"    min="0" max="100" step="1" /></label>
          </section>
          <section class="settings-section">
            <div class="settings-section-title">Features</div>
            <label class="feature-label"><input type="checkbox" id="hidePercentages"      /> Hide Percentages</label>
            <label class="feature-label"><input type="checkbox" id="idleTicks"            /> Idle Ticks</label>
            <label class="feature-label"><input type="checkbox" id="autoIncrementLosers" /> Auto Increment Losers</label>
            <label class="feature-label"><input type="checkbox" id="autoDecrementWinner" /> Auto Decrement Winner</label>
            <label class="feature-label"><input type="checkbox" id="autoRemoveWinner"    /> Auto Remove Winner</label>
          </section>
        </div>
        <div class="settings-right-col">
          <section class="settings-section">
            <div class="settings-section-title">🔊 Wheel Sounds</div>
            <div id="sndSettingsContainer"></div>
          </section>
          <section class="settings-section">
            <div class="settings-section-title">🖼️ Wheel Images</div>
            <div id="imgSettingsContainer" class="img-states-grid"></div>
          </section>
        </div>
      </div>
      <div class="scroll-fade bottom" id="settingsBottomFade"><div class="scroll-indicator">▼</div></div>
    </div>
    <div class="settings-panel-footer">
      <button id="defaultsBtn" class="danger">Restore Weights</button>
      <button id="restoreImagesBtn" class="danger">Restore Images</button>
      <button id="restoreSoundsBtn" class="danger">Restore Sounds</button>
    </div>
  </div>
</div>

<!-- ── Scripts (load order is critical — see each file's header comment) ── -->
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/emoji.js"></script>
<script src="js/audio.js"></script>
<script src="js/wheel.js"></script>
<script src="js/spin.js"></script>
<script src="js/ui.js"></script>
<script src="js/boot.js"></script>

</body>
</html>
