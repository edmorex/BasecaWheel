// ── Sound system ──────────────────────────────────────────────
// Default sound file paths — edit these to change what ships with the app.
const DEFAULT_SOUNDS = {
  bg:       "sounds/bg.wav",
  tick:     "sounds/tick.wav",
  boost:    "sounds/boost.wav",
  explode:  "sounds/explode.wav",
  fanfare:  "sounds/fanfare.wav",
  reverse:  "sounds/reverse.wav",
  shuffle:  "sounds/shuffle.wav",
  slowdown: "sounds/slowdown.wav",
};

const BG_VOL = 0.3;
const SOUND_VOLS = { explode:0.9, reverse:0.8, slowdown:0.8, boost:0.8, shuffle:0.8, fanfare:0.85 };
let muted = false;
let audioCtx = null;
let bgNode = null;
let bgFallbackAudio = null;
let bgFadeId = null;
let tickGain = null;
const audioBufs = {};
// URLs that couldn't be fetched (e.g. cross-origin without CORS headers) — played
// via HTMLAudioElement as a fallback, which doesn't need CORS for basic playback.
const audioFallbacks = {};


// Audio cold-start handling. Without preloading, the very first spin would
// try to construct the AudioContext + decode every WAV mid-spin; ticks would
// drop until decoding finished, and on Safari the first non-silent sample
// would also play at full system volume regardless of gain.
//
// Strategy:
//   1. Try to construct the AudioContext + decode all sound buffers at
//      script execution time. Modern browsers allow this in a "suspended"
//      state, and decodeAudioData works regardless of state.
//   2. Hook the very first user gesture (anywhere on the page) to resume
//      the suspended context — earlier than the wheel click — so by the
//      time someone spins, the context is "running" and buffers are decoded.
//   3. The first time we transition to running, play a 1-frame silent buffer
//      to warm the audio output path; this prevents the loud "first tick"
//      pop on Safari/iOS.
let audioPreloadPromise = null;
let audioWarmedUp       = false;

function isCrossOriginUrl(url) {
  try { return new URL(url, location.href).origin !== location.origin; }
  catch { return false; }
}

function makeAudioFallback(url) {
  const a = new Audio(url);
  a.preload = "auto";
  return a;
}

async function reloadSounds() {
  if (!audioCtx) return;
  await Promise.all(Object.keys(DEFAULT_SOUNDS).map(async key => {
    const url = (settings.customSounds && key in settings.customSounds)
      ? settings.customSounds[key]
      : DEFAULT_SOUNDS[key];
    delete audioFallbacks[key];
    if (!url) { audioBufs[key] = null; return; }
    // Cross-origin URLs cannot be decoded via fetch without CORS headers.
    // Skip straight to the HTMLAudioElement fallback which plays cross-origin freely.
    if (isCrossOriginUrl(url)) {
      audioBufs[key] = null;
      audioFallbacks[key] = makeAudioFallback(url);
      return;
    }
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      audioBufs[key] = await audioCtx.decodeAudioData(await res.arrayBuffer());
    } catch {
      audioBufs[key] = null;
      audioFallbacks[key] = makeAudioFallback(url);
    }
  }));
}

function preloadAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch {
    return; // very old/locked-down browsers — fall back to lazy init
  }
  tickGain = audioCtx.createGain();
  tickGain.gain.value = 0.65;
  tickGain.connect(audioCtx.destination);
  audioPreloadPromise = reloadSounds();
}

async function initAudio() {
  if (!audioCtx) preloadAudio();          // fallback if pre-load was blocked
  if (!audioCtx) return;
  if (audioCtx.state === "suspended") await audioCtx.resume();
  if (audioPreloadPromise) await audioPreloadPromise;

  if (!audioWarmedUp) {
    audioWarmedUp = true;
    try {
      const silent = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
      const src    = audioCtx.createBufferSource();
      src.buffer   = silent;
      src.connect(audioCtx.destination);
      src.start();
    } catch {}
  }
}

// Kick off decoding immediately. If the browser blocks pre-gesture context
// creation, this is effectively a no-op and the lazy path in initAudio() runs.
preloadAudio();

// On the very first user gesture anywhere, unlock + warm the audio path —
// well before the wheel click — so the first spin never drops ticks.
// Capture phase + once:true means this runs ahead of any other handler and
// auto-removes after firing.
const _firstUserGesture = () => { initAudio(); };
document.addEventListener("pointerdown", _firstUserGesture, { once: true, capture: true });
document.addEventListener("touchstart",  _firstUserGesture, { once: true, capture: true, passive: true });
document.addEventListener("keydown",     _firstUserGesture, { once: true, capture: true });

function playTick() {
  if (muted) return;
  if (audioCtx && audioBufs.tick) {
    const src = audioCtx.createBufferSource();
    src.buffer = audioBufs.tick;
    src.connect(tickGain);
    src.start();
  } else if (audioFallbacks.tick) {
    const a = audioFallbacks.tick.cloneNode();
    a.volume = 0.65;
    a.play().catch(e => console.warn("tick fallback failed:", e.message));
  }
}

function playSound(key) {
  if (muted) return;
  if (audioCtx && audioBufs[key]) {
    const gain = audioCtx.createGain();
    gain.gain.value = SOUND_VOLS[key] ?? 0.8;
    gain.connect(audioCtx.destination);
    const src = audioCtx.createBufferSource();
    src.buffer = audioBufs[key];
    src.connect(gain);
    src.start();
  } else if (audioFallbacks[key]) {
    const a = audioFallbacks[key].cloneNode();
    a.volume = SOUND_VOLS[key] ?? 0.8;
    a.play().catch(e => console.warn("sound fallback failed:", key, e.message));
  }
}

function stopBg() {
  if (bgFadeId) { clearTimeout(bgFadeId); bgFadeId = null; }
  if (bgNode) {
    try { bgNode.src.stop(); } catch {}
    bgNode.src.disconnect(); bgNode.gain.disconnect();
    bgNode = null;
  }
  if (bgFallbackAudio) {
    bgFallbackAudio.pause();
    bgFallbackAudio = null;
  }
}

function startBg() {
  if (muted) return;
  stopBg();
  if (audioCtx && audioBufs.bg) {
    const gain = audioCtx.createGain();
    gain.gain.value = BG_VOL;
    gain.connect(audioCtx.destination);
    const src = audioCtx.createBufferSource();
    src.buffer = audioBufs.bg;
    src.loop = true;
    src.connect(gain);
    src.start();
    bgNode = { src, gain };
  } else if (audioFallbacks.bg) {
    bgFallbackAudio = audioFallbacks.bg.cloneNode();
    bgFallbackAudio.loop = true;
    bgFallbackAudio.volume = BG_VOL;
    bgFallbackAudio.play().catch(e => console.warn("bg fallback failed:", e.message));
  }
}

function fadeBgOut(durationMs = 1000) {
  if (bgFallbackAudio) {
    const audio = bgFallbackAudio;
    const startVol = audio.volume;
    const steps = 20;
    const stepMs = durationMs / steps;
    let step = 0;
    bgFadeId = setInterval(() => {
      step++;
      audio.volume = Math.max(0, startVol * (1 - step / steps));
      if (step >= steps) { clearInterval(bgFadeId); bgFadeId = null; audio.pause(); }
    }, stepMs);
    bgFallbackAudio = null;
    return;
  }
  if (!bgNode || !audioCtx) return;
  if (bgFadeId) { clearTimeout(bgFadeId); bgFadeId = null; }
  const t = audioCtx.currentTime;
  bgNode.gain.gain.cancelScheduledValues(t);
  bgNode.gain.gain.setValueAtTime(bgNode.gain.gain.value, t);
  bgNode.gain.gain.linearRampToValueAtTime(0, t + durationMs/1000);
  bgFadeId = setTimeout(() => { stopBg(); bgFadeId = null; }, durationMs + 100);
}

// ── Winner history (session-only) ─────────────────────────────
// In-memory list, deliberately not persisted — wiped on reload.
const winnerHistory = [];
const historyBtn  = document.getElementById("historyBtn");
const historyList = document.getElementById("historyList");

function renderHistory() {
  historyList.innerHTML = "";
  // Prepend each entry so DOM order is newest-first; column-reverse layout
  // then renders newest at the bottom (closest to the button).
  winnerHistory.forEach(name => {
    const item = document.createElement("div");
    item.className   = "history-item";
    item.textContent = name;
    historyList.insertBefore(item, historyList.firstChild);
  });
}

function addToHistory(name) {
  winnerHistory.push(name);
  renderHistory();
}

historyBtn.onclick = () => {
  const nowHidden = historyList.classList.toggle("hidden");
  historyBtn.classList.toggle("active", !nowHidden);
};

const muteBtn = document.getElementById("muteBtn");
muteBtn.onclick = () => {
  muted = !muted;
  muteBtn.textContent = muted ? "🔇" : "🔊";
  muteBtn.title = muted ? "Unmute sounds" : "Mute sounds";
  if (muted) {
    if (bgFadeId) { clearTimeout(bgFadeId); bgFadeId = null; }
    stopBg();
  } else if (spinning) {
    initAudio().then(startBg);
  }
};

// ── Boot ──────────────────────────────────────────────────────
(function initWheelList() {
  let list = null;
  try {
    const raw = localStorage.getItem(WHEEL_LIST_KEY);
    if (raw) list = JSON.parse(raw);
  } catch {}

  if (!list || !list.length) {
    list = [];
    for (let i = 1; i <= 9; i++) {
      const raw = localStorage.getItem(`basca_slot_${i}`);
      if (!raw) continue;
      try {
        const d  = JSON.parse(raw);
        const id = `migrated_${i}`;
        localStorage.setItem(SLOT_KEY(id), raw);
        list.push({ id, title: d.title || `Wheel ${i}` });
      } catch {}
    }
    if (!list.length) {
      const id = newSlotId();
      list.push({ id, title: "Default" });
      localStorage.setItem(SLOT_KEY(id), JSON.stringify(defaultSlotData()));
    }
    localStorage.setItem(WHEEL_LIST_KEY, JSON.stringify(list));
  }

  wheelList = list;
  const savedId = localStorage.getItem(ACTIVE_SLOT_KEY);
  const valid   = wheelList.find(w => w.id === savedId);
  activateSlot(valid ? valid.id : wheelList[0].id);
})();

resizeCanvas();

// ── Image pre-caching ─────────────────────────────────────────
function precacheImages() {
  const seen = new Set();
  Object.values(EMOJI_VARIANTS).forEach(urls => {
    urls.forEach(url => {
      if (!seen.has(url)) { seen.add(url); new Image().src = url; }
    });
  });
}

precacheImages();

// Re-cache images/sounds and refresh the wheel emoji whenever settings closes.
new MutationObserver(() => {
  if (document.getElementById("settingsOverlay").classList.contains("hidden")) {
    precacheImages();
    if (audioCtx) reloadSounds();
    if (!spinning && !winnerShowing) setEmoji(currentEmojiState);
  }
}).observe(document.getElementById("settingsOverlay"), { attributes: true, attributeFilter: ["class"] });
</script>
